<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#1E293B" />
    </linearGradient>

    <!-- Platform Badge Styling Gradients -->
    <linearGradient id="badge-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0.02" />
    </linearGradient>
  </defs>

  <style>
    .title { font-family: 'Outfit', 'Inter', system-ui, -apple-system, sans-serif; font-weight: 800; font-size: 38px; fill: #FFFFFF; letter-spacing: 4px; }
    .subtitle { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 500; font-size: 14px; fill: #94A3B8; letter-spacing: 0.5px; }
    .tagline { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 400; font-size: 12px; fill: #64748B; }
    .badge-text { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 600; font-size: 11px; fill: #38BDF8; }
    .badge-bg { fill: url(#badge-glow); stroke: #38BDF8; stroke-opacity: 0.25; stroke-width: 1px; }
    .conn-line { stroke: #475569; stroke-opacity: 0.15; stroke-dasharray: 3 3; }
    .network-node { fill: #475569; fill-opacity: 0.3; }
  </style>

  <!-- Background Layer -->
  <rect width="800" height="300" fill="url(#bg-grad)" />

  <!-- Clean, Static Network Background (No animations, extremely subtle) -->
  <g>
    <line x1="60" y1="50" x2="180" y2="100" class="conn-line" />
    <line x1="180" y1="100" x2="120" y2="200" class="conn-line" />
    <line x1="120" y1="200" x2="260" y2="170" class="conn-line" />
    <line x1="180" y1="100" x2="260" y2="170" class="conn-line" />
    <line x1="260" y1="170" x2="350" y2="110" class="conn-line" />
    
    <line x1="540" y1="80" x2="640" y2="40" class="conn-line" />
    <line x1="640" y1="40" x2="720" y2="140" class="conn-line" />
    <line x1="640" y1="40" x2="580" y2="190" class="conn-line" />
    <line x1="580" y1="190" x2="720" y2="140" class="conn-line" />
    <line x1="450" y1="110" x2="540" y2="80" class="conn-line" />

    <circle cx="60" cy="50" r="2.5" class="network-node" />
    <circle cx="180" cy="100" r="3" class="network-node" />
    <circle cx="120" cy="200" r="2.5" class="network-node" />
    <circle cx="260" cy="170" r="3.5" class="network-node" />
    
    <circle cx="540" cy="80" r="3" class="network-node" />
    <circle cx="640" cy="40" r="2.5" class="network-node" />
    <circle cx="720" cy="140" r="3.5" class="network-node" />
    <circle cx="580" cy="190" r="2.5" class="network-node" />
  </g>

  <!-- Central App Logo (Cleanly embedded without glow) -->
  <g transform="translate(364, 45)">
    <!-- Subtle circular backplate for logo contrast -->
    <rect width="72" height="72" rx="16" fill="#1E293B" stroke="#334155" stroke-width="1" />
    <image href="data:image/png;base64," x="4" y="4" width="64" height="64" />
  </g>

  <!-- Brand Typography -->
  <text x="400" y="162" text-anchor="middle" class="title">SYNAPSE</text>
  <text x="400" y="190" text-anchor="middle" class="subtitle">A Professional Cross-Platform Client for Syncthing</text>
  <text x="400" y="210" text-anchor="middle" class="tagline">Built with Compose Multiplatform &amp; Kotlin</text>

  <!-- Platform Badges -->
  <g transform="translate(283, 235)">
    <!-- Android -->
    <g transform="translate(0, 0)">
      <rect width="76" height="20" rx="10" class="badge-bg" />
      <text x="38" y="14" text-anchor="middle" class="badge-text">Android</text>
    </g>
    <!-- Desktop -->
    <g transform="translate(86, 0)">
      <rect width="78" height="20" rx="10" class="badge-bg" />
      <text x="39" y="14" text-anchor="middle" class="badge-text">Desktop</text>
    </g>
    <!-- Web -->
    <g transform="translate(174, 0)">
      <rect width="60" height="20" rx="10" class="badge-bg" />
      <text x="30" y="14" text-anchor="middle" class="badge-text">Web</text>
    </g>
  </g>
</svg>