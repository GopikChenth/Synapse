<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="100%" height="100%">
  <style>
    .label-title { font-family: 'Outfit', 'Inter', system-ui, -apple-system, sans-serif; font-weight: 700; font-size: 14px; fill: #FFFFFF; letter-spacing: 0.5px; }
    .label-desc { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 500; font-size: 11px; fill: #94A3B8; }
    .label-flow { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 600; font-size: 10px; fill: #38BDF8; letter-spacing: 0.5px; }
    .label-flow-p2p { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 600; font-size: 10px; fill: #10B981; letter-spacing: 0.5px; }
    .node-box { fill: #1E293B; stroke: #334155; stroke-width: 1.5px; }
    .node-box-active { fill: #1E293B; stroke: #38BDF8; stroke-width: 2px; }
    .node-box-status { fill: #1E293B; stroke: #10B981; stroke-width: 2px; }
    .flow-line { fill: none; stroke: #38BDF8; stroke-width: 2px; stroke-linecap: round; }
    .flow-line-p2p { fill: none; stroke: #10B981; stroke-width: 2px; stroke-dasharray: 4 4; }
    .arrow { fill: #38BDF8; }
    .arrow-p2p { fill: #10B981; }
  </style>

  <!-- Background (Flat slate color) -->
  <rect width="800" height="220" fill="#0F172A" rx="12" stroke="#1E293B" stroke-width="1" />

  <!-- 1. SYNAPSE UI APP BLOCK -->
  <g transform="translate(40, 40)">
    <rect width="180" height="130" rx="12" class="node-box-active" />
    <text x="90" y="32" text-anchor="middle" class="label-title">Synapse GUI App</text>
    <text x="90" y="60" text-anchor="middle" class="label-desc">Compose Multiplatform</text>
    <text x="90" y="82" text-anchor="middle" class="label-desc">Android • Desktop • Web</text>
    <text x="90" y="104" text-anchor="middle" class="label-desc">Ktor Integration</text>
  </g>

  <!-- 2. LOCAL SYNCTHING DAEMON BLOCK -->
  <g transform="translate(340, 40)">
    <rect width="180" height="130" rx="12" class="node-box" />
    <text x="90" y="32" text-anchor="middle" class="label-title">Syncthing Daemon</text>
    <text x="90" y="60" text-anchor="middle" class="label-desc">Local Go Service</text>
    <text x="90" y="82" text-anchor="middle" class="label-desc">Port: 8384 (HTTP/S)</text>
    <text x="90" y="104" text-anchor="middle" class="label-desc">Handles Folder Syncing</text>
  </g>

  <!-- 3. REMOTE PEERS BLOCK -->
  <g transform="translate(620, 65)">
    <rect width="140" height="80" rx="12" class="node-box-status" />
    <text x="70" y="30" text-anchor="middle" class="label-title">Remote Peers</text>
    <text x="70" y="52" text-anchor="middle" class="label-desc">Phones, Laptops</text>
  </g>

  <!-- CONNECTION: SYNAPSE -> DAEMON (REST API + WebSocket) -->
  <g transform="translate(0, -10)">
    <path d="M 220 100 L 340 100" class="flow-line" />
    <path d="M 340 130 L 220 130" class="flow-line" />
    <polygon points="338,100 330,95 330,105" class="arrow" />
    <polygon points="222,130 230,125 230,135" class="arrow" />
    <text x="280" y="90" text-anchor="middle" class="label-flow">REST API</text>
    <text x="280" y="148" text-anchor="middle" class="label-flow">WebSockets</text>
  </g>

  <!-- CONNECTION: DAEMON -> REMOTE PEERS (BEP Protocol) -->
  <g transform="translate(0, -10)">
    <path d="M 520 115 L 620 115" class="flow-line-p2p" />
    <polygon points="618,115 610,110 610,120" class="arrow-p2p" />
    <text x="570" y="105" text-anchor="middle" class="label-flow-p2p">P2P Sync</text>
    <text x="570" y="132" text-anchor="middle" class="label-flow-p2p">BEP Protocol</text>
  </g>
</svg>